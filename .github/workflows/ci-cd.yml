name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: splitwise_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: splitwise_test
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: test-secret
        run: npm test

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/splitwise-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/splitwise-backend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/splitwise-backend:latest
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/splitwise-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/splitwise-frontend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/splitwise-frontend:latest
          cache-to: type=inline

      - name: Image digest
        run: |
          echo "Backend image pushed successfully"
          echo "Frontend image pushed successfully"

  deploy-to-eks:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name splitwise-cluster --region us-east-1

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to EKS
        run: |
          # Update backend deployment
          kubectl set image deployment/backend \
            backend=${{ secrets.DOCKER_USERNAME }}/splitwise-backend:${{ steps.meta.outputs.sha_short }} \
            -n splitwise
          
          # Update frontend deployment
          kubectl set image deployment/frontend \
            frontend=${{ secrets.DOCKER_USERNAME }}/splitwise-frontend:${{ steps.meta.outputs.sha_short }} \
            -n splitwise
          
          # Wait for rollout to complete
          kubectl rollout status deployment/backend -n splitwise --timeout=5m
          kubectl rollout status deployment/frontend -n splitwise --timeout=5m

      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          kubectl get pods -n splitwise
          kubectl get ingress -n splitwise
          
          # Get ALB URL
          ALB_URL=$(kubectl get ingress splitwise-ingress -n splitwise -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Application URL: http://$ALB_URL"
          
          # Test backend health
          echo "Testing backend health..."
          curl -f http://$ALB_URL/api/health || echo "Health check failed"

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Backend image: ${{ secrets.DOCKER_USERNAME }}/splitwise-backend:${{ steps.meta.outputs.sha_short }}"
          echo "Frontend image: ${{ secrets.DOCKER_USERNAME }}/splitwise-frontend:${{ steps.meta.outputs.sha_short }}"
